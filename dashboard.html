<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LORD AI — لوحة التحكم</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ═══════ RESET & VARIABLES ═══════ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-0: #0a0a0a;
            --bg-1: #111111;
            --bg-2: #1a1a1a;
            --bg-3: #222222;
            --bg-4: #2a2a2a;
            --border: #2d2d2d;
            --border-2: #363636;
            --text-1: #f5f5f5;
            --text-2: #a0a0a0;
            --text-3: #666666;
            --accent: #6366f1;
            --accent-2: #818cf8;
            --green: #22c55e;
            --green-bg: rgba(34,197,94,0.1);
            --red: #ef4444;
            --red-bg: rgba(239,68,68,0.1);
            --blue: #3b82f6;
            --blue-bg: rgba(59,130,246,0.1);
            --orange: #f59e0b;
            --orange-bg: rgba(245,158,11,0.1);
            --purple: #a855f7;
            --purple-bg: rgba(168,85,247,0.1);
            --cyan: #06b6d4;
            --cyan-bg: rgba(6,182,212,0.1);
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 1px 3px rgba(0,0,0,0.3);
            --font: 'Inter', 'Noto Sans Arabic', sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }

        body {
            font-family: var(--font);
            background: var(--bg-0);
            color: var(--text-1);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ═══════ LAYOUT ═══════ */
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* ═══════ HEADER ═══════ */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 18px;
            color: #fff;
            letter-spacing: -1px;
        }

        .logo-text h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .logo-text span {
            font-size: 12px;
            color: var(--text-3);
            font-weight: 400;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 9px 18px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-2);
            color: var(--text-2);
            font-family: var(--font);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 7px;
            text-decoration: none;
        }

        .btn:hover { background: var(--bg-3); color: var(--text-1); border-color: var(--border-2); }
        .btn-danger:hover { background: var(--red-bg); color: var(--red); border-color: rgba(239,68,68,0.3); }
        .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn-primary:hover { background: var(--accent-2); }

        /* ═══════ STATUS BAR ═══════ */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 14px 20px;
            background: var(--bg-1);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 24px;
            font-size: 13px;
            color: var(--text-2);
            flex-wrap: wrap;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--green);
            animation: pulse 2s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-sep { width: 1px; height: 16px; background: var(--border); }

        /* ═══════ STATS GRID ═══════ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--bg-1);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover { border-color: var(--border-2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }

        .stat-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
        }

        .stat-card.green::after { background: linear-gradient(90deg, var(--green), transparent); }
        .stat-card.blue::after { background: linear-gradient(90deg, var(--blue), transparent); }
        .stat-card.purple::after { background: linear-gradient(90deg, var(--purple), transparent); }
        .stat-card.orange::after { background: linear-gradient(90deg, var(--orange), transparent); }
        .stat-card.red::after { background: linear-gradient(90deg, var(--red), transparent); }
        .stat-card.cyan::after { background: linear-gradient(90deg, var(--cyan), transparent); }

        .stat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-3);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon.green { background: var(--green-bg); color: var(--green); }
        .stat-icon.blue { background: var(--blue-bg); color: var(--blue); }
        .stat-icon.purple { background: var(--purple-bg); color: var(--purple); }
        .stat-icon.orange { background: var(--orange-bg); color: var(--orange); }
        .stat-icon.red { background: var(--red-bg); color: var(--red); }
        .stat-icon.cyan { background: var(--cyan-bg); color: var(--cyan); }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1;
            margin-bottom: 6px;
            font-family: var(--mono);
        }

        .stat-sub {
            font-size: 12px;
            color: var(--text-3);
        }

        /* ═══════ SECTIONS GRID ═══════ */
        .sections-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 28px;
        }

        .section {
            background: var(--bg-1);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .section-full { grid-column: 1 / -1; }

        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-body { padding: 20px; }

        /* ═══════ CHART ═══════ */
        .chart-container {
            width: 100%;
            height: 220px;
            position: relative;
        }

        .chart-container canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            height: 180px;
            padding-top: 10px;
        }

        .bar-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .bar {
            width: 100%;
            min-height: 4px;
            border-radius: 4px 4px 0 0;
            background: linear-gradient(180deg, var(--accent), rgba(99,102,241,0.3));
            transition: height 0.8s cubic-bezier(0.4,0,0.2,1);
            position: relative;
        }

        .bar:hover { background: linear-gradient(180deg, var(--accent-2), rgba(129,140,248,0.4)); }

        .bar-label {
            font-size: 10px;
            color: var(--text-3);
            font-family: var(--mono);
        }

        .bar-value {
            font-size: 10px;
            color: var(--text-2);
            font-family: var(--mono);
            font-weight: 600;
        }

        /* ═══════ HEATMAP ═══════ */
        .heatmap {
            display: grid;
            grid-template-columns: repeat(24, 1fr);
            gap: 3px;
        }

        .heat-cell {
            aspect-ratio: 1;
            border-radius: 3px;
            background: var(--bg-3);
            transition: all 0.3s;
            position: relative;
        }

        .heat-cell[data-level="1"] { background: rgba(99,102,241,0.2); }
        .heat-cell[data-level="2"] { background: rgba(99,102,241,0.4); }
        .heat-cell[data-level="3"] { background: rgba(99,102,241,0.6); }
        .heat-cell[data-level="4"] { background: var(--accent); }

        .heat-labels {
            display: grid;
            grid-template-columns: repeat(24, 1fr);
            gap: 3px;
            margin-top: 6px;
        }

        .heat-labels span {
            font-size: 9px;
            color: var(--text-3);
            text-align: center;
            font-family: var(--mono);
        }

        /* ═══════ TABLE ═══════ */
        .table-wrap { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: right;
            padding: 10px 14px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 12px 14px;
            font-size: 13px;
            color: var(--text-2);
            border-bottom: 1px solid var(--border);
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--bg-2); }

        .badge {
            display: inline-flex;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-green { background: var(--green-bg); color: var(--green); }
        .badge-blue { background: var(--blue-bg); color: var(--blue); }
        .badge-orange { background: var(--orange-bg); color: var(--orange); }
        .badge-purple { background: var(--purple-bg); color: var(--purple); }

        /* ═══════ LANG BARS ═══════ */
        .lang-bar-wrap {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .lang-item label {
            font-size: 12px;
            color: var(--text-2);
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .lang-track {
            width: 100%;
            height: 8px;
            background: var(--bg-3);
            border-radius: 4px;
            overflow: hidden;
        }

        .lang-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1s ease;
        }

        .lang-fill.ar { background: linear-gradient(90deg, var(--accent), var(--purple)); }
        .lang-fill.en { background: linear-gradient(90deg, var(--blue), var(--cyan)); }

        /* ═══════ DONUT ═══════ */
        .donut-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        .donut-chart {
            width: 150px;
            height: 150px;
            position: relative;
        }

        .donut-chart canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .donut-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .donut-center .val { font-size: 24px; font-weight: 800; font-family: var(--mono); }
        .donut-center .lbl { font-size: 10px; color: var(--text-3); }

        .donut-legend {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-2);
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
        }

        /* ═══════ EMPTY ═══════ */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--text-3);
            gap: 12px;
        }

        .empty-state svg { opacity: 0.3; }
        .empty-state p { font-size: 13px; }

        /* ═══════ TOAST ═══════ */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--bg-3);
            color: var(--text-1);
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            border: 1px solid var(--border);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }

        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ═══════ ANIMATIONS ═══════ */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stat-card { animation: fadeInUp 0.5s ease both; }
        .stat-card:nth-child(1) { animation-delay: 0.05s; }
        .stat-card:nth-child(2) { animation-delay: 0.1s; }
        .stat-card:nth-child(3) { animation-delay: 0.15s; }
        .stat-card:nth-child(4) { animation-delay: 0.2s; }
        .stat-card:nth-child(5) { animation-delay: 0.25s; }
        .stat-card:nth-child(6) { animation-delay: 0.3s; }

        .section { animation: fadeInUp 0.5s ease 0.35s both; }

        /* ═══════ RESPONSIVE ═══════ */
        @media (max-width: 900px) {
            .sections-grid { grid-template-columns: 1fr; }
            .dashboard { padding: 16px; }
        }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .header { flex-direction: column; gap: 16px; align-items: flex-start; }
            .stat-value { font-size: 24px; }
            .stat-card { padding: 16px; }
            .heatmap { grid-template-columns: repeat(12, 1fr); }
            .heat-labels { grid-template-columns: repeat(12, 1fr); }
        }

        /* scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- HEADER -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">L</div>
                <div class="logo-text">
                    <h1>لوحة التحكم</h1>
                    <span>LORD AI Dashboard</span>
                </div>
            </div>
            <div class="header-actions">
                <a href="index.html" class="btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    العودة للشات
                </a>
                <button class="btn" onclick="exportData()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    تصدير البيانات
                </button>
                <button class="btn btn-danger" onclick="clearAnalytics()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    مسح
                </button>
            </div>
        </header>

        <!-- STATUS BAR -->
        <div class="status-bar">
            <div class="status-dot"></div>
            <span>النظام يعمل</span>
            <div class="status-sep"></div>
            <span>النموذج: <strong>Llama 3.3 70B</strong></span>
            <div class="status-sep"></div>
            <span>المزود: <strong>Groq</strong></span>
            <div class="status-sep"></div>
            <span id="lastActive">آخر نشاط: —</span>
            <div class="status-sep"></div>
            <span id="uptime">مدة الاستخدام: —</span>
        </div>

        <!-- STATS CARDS -->
        <div class="stats-grid" id="statsGrid">
            <!-- Filled by JS -->
        </div>

        <!-- SECTIONS -->
        <div class="sections-grid">
            <!-- Messages Chart -->
            <div class="section section-full">
                <div class="section-head">
                    <div class="section-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                        نشاط الرسائل — آخر 14 يوم
                    </div>
                </div>
                <div class="section-body">
                    <div class="bar-chart" id="messagesChart"></div>
                </div>
            </div>

            <!-- Hourly Heatmap -->
            <div class="section">
                <div class="section-head">
                    <div class="section-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--orange)" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
                        نشاط حسب الساعة
                    </div>
                </div>
                <div class="section-body">
                    <div class="heatmap" id="heatmap"></div>
                    <div class="heat-labels" id="heatLabels"></div>
                </div>
            </div>

            <!-- Language Distribution -->
            <div class="section">
                <div class="section-head">
                    <div class="section-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                        توزيع اللغات
                    </div>
                </div>
                <div class="section-body">
                    <div class="lang-bar-wrap" id="langBars"></div>
                </div>
            </div>

            <!-- Message Ratio -->
            <div class="section">
                <div class="section-head">
                    <div class="section-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--purple)" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                        نسبة الرسائل
                    </div>
                </div>
                <div class="section-body">
                    <div class="donut-container" id="donutChart"></div>
                </div>
            </div>

            <!-- Performance -->
            <div class="section">
                <div class="section-head">
                    <div class="section-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                        الأداء
                    </div>
                </div>
                <div class="section-body" id="perfSection"></div>
            </div>

            <!-- Recent Conversations -->
            <div class="section section-full">
                <div class="section-head">
                    <div class="section-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        أحدث المحادثات
                    </div>
                    <span style="font-size:12px;color:var(--text-3)" id="totalConvsLabel"></span>
                </div>
                <div class="section-body" style="padding:0">
                    <div class="table-wrap" id="convsTable"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        /* ═══════ HELPERS ═══════ */
        function get(k, d) {
            try { var v = localStorage.getItem(k); return v ? JSON.parse(v) : d; }
            catch(e) { return d; }
        }

        function toast(msg) {
            var old = document.querySelector('.toast');
            if (old) old.remove();
            var t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            requestAnimationFrame(function() { t.classList.add('show'); });
            setTimeout(function() { t.classList.remove('show'); setTimeout(function() { t.remove(); }, 300); }, 2500);
        }

        function timeAgo(ts) {
            if (!ts) return '—';
            var diff = Date.now() - ts;
            var s = Math.floor(diff / 1000);
            if (s < 60) return 'الآن';
            var m = Math.floor(s / 60);
            if (m < 60) return m + ' دقيقة';
            var h = Math.floor(m / 60);
            if (h < 24) return h + ' ساعة';
            var d = Math.floor(h / 24);
            return d + ' يوم';
        }

        function formatNum(n) {
            if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n/1000).toFixed(1) + 'K';
            return n.toString();
        }

        /* ═══════ DATA ═══════ */
        var convs = get('lord_convs', []);
        var analytics = get('lord_analytics', { events: [], sessions: [], firstUse: null });

        // Compute stats from conversations
        var totalConvs = convs.length;
        var totalMsgs = 0;
        var totalUserMsgs = 0;
        var totalAIMsgs = 0;
        var totalUserWords = 0;
        var totalAIWords = 0;
        var allMsgs = [];
        var lastMsgTs = 0;

        for (var i = 0; i < convs.length; i++) {
            var c = convs[i];
            for (var j = 0; j < c.msgs.length; j++) {
                var m = c.msgs[j];
                totalMsgs++;
                allMsgs.push({ role: m.role, content: m.content, ts: m.ts || c.ts, convId: c.id, convTitle: c.title });
                var wc = (m.content || '').split(/\s+/).filter(function(w){return w}).length;
                if (m.role === 'user') { totalUserMsgs++; totalUserWords += wc; }
                else { totalAIMsgs++; totalAIWords += wc; }
                var mts = m.ts || c.ts || 0;
                if (mts > lastMsgTs) lastMsgTs = mts;
            }
        }

        // Response times from analytics
        var responseTimes = [];
        var langCounts = { ar: 0, en: 0 };
        var errorCount = 0;
        var hourlyActivity = new Array(24).fill(0);

        for (var k = 0; k < analytics.events.length; k++) {
            var ev = analytics.events[k];
            if (ev.type === 'ai_msg' && ev.data.responseTime) {
                responseTimes.push(ev.data.responseTime);
            }
            if (ev.type === 'user_msg' && ev.data.lang) {
                langCounts[ev.data.lang] = (langCounts[ev.data.lang] || 0) + 1;
            }
            if (ev.type === 'error') errorCount++;

            // Hourly activity
            var hour = new Date(ev.ts).getHours();
            hourlyActivity[hour]++;
        }

        // Also compute hourly from messages if no analytics yet
        if (analytics.events.length === 0) {
            for (var a = 0; a < allMsgs.length; a++) {
                if (allMsgs[a].ts) {
                    var h2 = new Date(allMsgs[a].ts).getHours();
                    hourlyActivity[h2]++;
                }
                if (allMsgs[a].role === 'user') {
                    var isAr = /[\u0600-\u06FF]/.test(allMsgs[a].content);
                    langCounts[isAr ? 'ar' : 'en']++;
                }
            }
        }

        var avgResponseTime = responseTimes.length
            ? Math.round(responseTimes.reduce(function(a,b){return a+b},0) / responseTimes.length)
            : 0;

        var avgUserWords = totalUserMsgs ? Math.round(totalUserWords / totalUserMsgs) : 0;
        var avgAIWords = totalAIMsgs ? Math.round(totalAIWords / totalAIMsgs) : 0;
        var totalSessions = analytics.sessions.length || 1;

        /* ═══════ RENDER STATS CARDS ═══════ */
        var statsHTML = '';
        var stats = [
            { label: 'المحادثات', value: totalConvs, icon: '💬', color: 'blue', sub: 'إجمالي المحادثات' },
            { label: 'الرسائل', value: totalMsgs, icon: '📨', color: 'green', sub: totalUserMsgs + ' مستخدم · ' + totalAIMsgs + ' ذكاء' },
            { label: 'الكلمات', value: formatNum(totalUserWords + totalAIWords), icon: '📝', color: 'purple', sub: 'مستخدم: ' + formatNum(totalUserWords) + ' · ذكاء: ' + formatNum(totalAIWords) },
            { label: 'متوسط الرد', value: avgResponseTime ? (avgResponseTime/1000).toFixed(1)+'s' : '—', icon: '⚡', color: 'orange', sub: 'وقت استجابة الذكاء' },
            { label: 'الجلسات', value: totalSessions, icon: '📊', color: 'cyan', sub: 'إجمالي الجلسات' },
            { label: 'الأخطاء', value: errorCount, icon: '⚠️', color: 'red', sub: errorCount === 0 ? 'لا أخطاء ✓' : 'حدثت أخطاء' },
        ];

        for (var s = 0; s < stats.length; s++) {
            var st = stats[s];
            statsHTML += '<div class="stat-card ' + st.color + '">'
                + '<div class="stat-header">'
                + '<span class="stat-label">' + st.label + '</span>'
                + '<div class="stat-icon ' + st.color + '">' + st.icon + '</div>'
                + '</div>'
                + '<div class="stat-value">' + st.value + '</div>'
                + '<div class="stat-sub">' + st.sub + '</div>'
                + '</div>';
        }
        document.getElementById('statsGrid').innerHTML = statsHTML;

        /* ═══════ STATUS BAR ═══════ */
        document.getElementById('lastActive').textContent = 'آخر نشاط: ' + timeAgo(lastMsgTs);
        if (analytics.firstUse) {
            var days = Math.floor((Date.now() - analytics.firstUse) / 86400000);
            document.getElementById('uptime').textContent = 'مدة الاستخدام: ' + (days || 1) + ' يوم';
        }

        /* ═══════ MESSAGES BAR CHART ═══════ */
        var chartEl = document.getElementById('messagesChart');
        var dailyMsgs = {};
        for (var d = 13; d >= 0; d--) {
            var date = new Date();
            date.setDate(date.getDate() - d);
            var key = date.toISOString().split('T')[0];
            dailyMsgs[key] = 0;
        }

        for (var mi = 0; mi < allMsgs.length; mi++) {
            var ts = allMsgs[mi].ts;
            if (ts) {
                var dk = new Date(ts).toISOString().split('T')[0];
                if (dk in dailyMsgs) dailyMsgs[dk]++;
            }
        }

        // Also count from conv timestamps if msgs don't have ts
        for (var ci = 0; ci < convs.length; ci++) {
            if (convs[ci].ts) {
                var ck = new Date(convs[ci].ts).toISOString().split('T')[0];
                if (ck in dailyMsgs && !convs[ci].msgs[0]?.ts) {
                    dailyMsgs[ck] += convs[ci].msgs.length;
                }
            }
        }

        var keys = Object.keys(dailyMsgs);
        var maxVal = Math.max.apply(null, keys.map(function(k){return dailyMsgs[k]})) || 1;
        var chartHTML = '';
        for (var bi = 0; bi < keys.length; bi++) {
            var bk = keys[bi];
            var bv = dailyMsgs[bk];
            var bh = Math.max(4, (bv / maxVal) * 160);
            var dayName = new Date(bk).toLocaleDateString('ar-EG', { weekday: 'short' });
            var dayNum = bk.split('-')[2];
            chartHTML += '<div class="bar-col">'
                + '<span class="bar-value">' + (bv || '') + '</span>'
                + '<div class="bar" style="height:' + bh + 'px" title="' + bk + ': ' + bv + ' رسالة"></div>'
                + '<span class="bar-label">' + dayNum + '</span>'
                + '</div>';
        }
        chartEl.innerHTML = chartHTML;

        /* ═══════ HOURLY HEATMAP ═══════ */
        var heatEl = document.getElementById('heatmap');
        var heatLabelsEl = document.getElementById('heatLabels');
        var maxHour = Math.max.apply(null, hourlyActivity) || 1;
        var heatHTML = '', heatLabelHTML = '';

        for (var hi = 0; hi < 24; hi++) {
            var hv = hourlyActivity[hi];
            var level = 0;
            if (hv > 0) level = 1;
            if (hv > maxHour * 0.25) level = 2;
            if (hv > maxHour * 0.5) level = 3;
            if (hv > maxHour * 0.75) level = 4;
            heatHTML += '<div class="heat-cell" data-level="' + level + '" title="الساعة ' + hi + ': ' + hv + ' حدث"></div>';
            heatLabelHTML += '<span>' + (hi % 3 === 0 ? hi + ':00' : '') + '</span>';
        }
        heatEl.innerHTML = heatHTML;
        heatLabelsEl.innerHTML = heatLabelHTML;

        /* ═══════ LANGUAGE BARS ═══════ */
        var langEl = document.getElementById('langBars');
        var totalLang = (langCounts.ar || 0) + (langCounts.en || 0) || 1;
        var arPct = Math.round(((langCounts.ar || 0) / totalLang) * 100);
        var enPct = 100 - arPct;

        langEl.innerHTML = '<div class="lang-item">'
            + '<label><span>🇸🇦 العربية</span><strong>' + arPct + '%</strong></label>'
            + '<div class="lang-track"><div class="lang-fill ar" style="width:' + arPct + '%"></div></div>'
            + '</div>'
            + '<div class="lang-item">'
            + '<label><span>🇺🇸 الإنجليزية</span><strong>' + enPct + '%</strong></label>'
            + '<div class="lang-track"><div class="lang-fill en" style="width:' + enPct + '%"></div></div>'
            + '</div>'
            + '<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:12px;color:var(--text-3)">'
            + '<span>إجمالي رسائل المستخدم: ' + totalUserMsgs + '</span>'
            + '<span>عربي: ' + (langCounts.ar||0) + ' · إنجليزي: ' + (langCounts.en||0) + '</span>'
            + '</div>';

        /* ═══════ DONUT CHART ═══════ */
        var donutEl = document.getElementById('donutChart');
        var totalDonut = totalUserMsgs + totalAIMsgs || 1;
        var userPct = Math.round((totalUserMsgs / totalDonut) * 100);
        var aiPct = 100 - userPct;

        donutEl.innerHTML = '<div class="donut-chart">'
            + '<canvas id="donutCanvas" width="150" height="150"></canvas>'
            + '<div class="donut-center"><div class="val">' + totalMsgs + '</div><div class="lbl">رسالة</div></div>'
            + '</div>'
            + '<div class="donut-legend">'
            + '<div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>المستخدم (' + userPct + '%)</div>'
            + '<div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>الذكاء (' + aiPct + '%)</div>'
            + '<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">'
            + '<div class="legend-item" style="font-size:12px;color:var(--text-3)">متوسط كلمات المستخدم: ' + avgUserWords + '</div>'
            + '<div class="legend-item" style="font-size:12px;color:var(--text-3)">متوسط كلمات الذكاء: ' + avgAIWords + '</div>'
            + '</div></div>';

        // Draw donut
        setTimeout(function() {
            var canvas = document.getElementById('donutCanvas');
            if (!canvas) return;
            var ctx = canvas.getContext('2d');
            var cx = 75, cy = 75, r = 55, lw = 18;

            // AI slice
            var aiAngle = (aiPct / 100) * Math.PI * 2;
            ctx.beginPath();
            ctx.arc(cx, cy, r, -Math.PI/2, -Math.PI/2 + aiAngle);
            ctx.strokeStyle = '#22c55e';
            ctx.lineWidth = lw;
            ctx.lineCap = 'round';
            ctx.stroke();

            // User slice
            ctx.beginPath();
            ctx.arc(cx, cy, r, -Math.PI/2 + aiAngle, -Math.PI/2 + Math.PI*2);
            ctx.strokeStyle = '#6366f1';
            ctx.lineWidth = lw;
            ctx.lineCap = 'round';
            ctx.stroke();
        }, 100);

        /* ═══════ PERFORMANCE ═══════ */
        var perfEl = document.getElementById('perfSection');
        var perfItems = [
            { label: 'متوسط وقت الاستجابة', value: avgResponseTime ? (avgResponseTime/1000).toFixed(1) + ' ثانية' : 'غير متاح', color: 'var(--green)' },
            { label: 'أسرع استجابة', value: responseTimes.length ? (Math.min.apply(null, responseTimes)/1000).toFixed(1) + ' ثانية' : '—', color: 'var(--blue)' },
            { label: 'أبطأ استجابة', value: responseTimes.length ? (Math.max.apply(null, responseTimes)/1000).toFixed(1) + ' ثانية' : '—', color: 'var(--orange)' },
            { label: 'إجمالي الكلمات المولدة', value: formatNum(totalAIWords), color: 'var(--purple)' },
            { label: 'نسبة النجاح', value: totalAIMsgs ? Math.round((totalAIMsgs / (totalAIMsgs + errorCount)) * 100) + '%' : '—', color: 'var(--cyan)' },
        ];

        var perfHTML = '<div style="display:flex;flex-direction:column;gap:14px">';
        for (var pi = 0; pi < perfItems.length; pi++) {
            var p = perfItems[pi];
            perfHTML += '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg-2);border-radius:var(--radius-sm)">'
                + '<span style="font-size:13px;color:var(--text-2)">' + p.label + '</span>'
                + '<span style="font-size:14px;font-weight:700;color:' + p.color + ';font-family:var(--mono)">' + p.value + '</span>'
                + '</div>';
        }
        perfHTML += '</div>';
        perfEl.innerHTML = perfHTML;

        /* ═══════ CONVERSATIONS TABLE ═══════ */
        var tableEl = document.getElementById('convsTable');
        document.getElementById('totalConvsLabel').textContent = 'إجمالي: ' + totalConvs;

        if (!convs.length) {
            tableEl.innerHTML = '<div class="empty-state">'
                + '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'
                + '<p>لا توجد محادثات بعد</p></div>';
        } else {
            var tbl = '<table><thead><tr><th>العنوان</th><th>الرسائل</th><th>الكلمات</th><th>التاريخ</th><th>الحالة</th></tr></thead><tbody>';
            var shown = convs.slice(0, 20);
            for (var ti = 0; ti < shown.length; ti++) {
                var tc = shown[ti];
                var tmsgCount = tc.msgs.length;
                var twords = 0;
                for (var tw = 0; tw < tc.msgs.length; tw++) {
                    twords += (tc.msgs[tw].content || '').split(/\s+/).filter(function(w){return w}).length;
                }
                var tdate = tc.ts ? new Date(tc.ts).toLocaleDateString('ar-EG', { month: 'short', day: 'numeric' }) : '—';
                var badge = tmsgCount > 10 ? '<span class="badge badge-purple">نشطة</span>'
                    : tmsgCount > 4 ? '<span class="badge badge-blue">متوسطة</span>'
                    : '<span class="badge badge-green">قصيرة</span>';

                tbl += '<tr>'
                    + '<td style="font-weight:500;color:var(--text-1);max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (tc.title || 'بدون عنوان') + '</td>'
                    + '<td>' + tmsgCount + '</td>'
                    + '<td>' + formatNum(twords) + '</td>'
                    + '<td style="font-family:var(--mono);font-size:12px">' + tdate + '</td>'
                    + '<td>' + badge + '</td>'
                    + '</tr>';
            }
            tbl += '</tbody></table>';
            tableEl.innerHTML = tbl;
        }

        /* ═══════ GLOBAL FUNCTIONS ═══════ */
        window.exportData = function() {
            var data = {
                conversations: convs,
                analytics: analytics,
                exportDate: new Date().toISOString(),
                stats: {
                    totalConversations: totalConvs,
                    totalMessages: totalMsgs,
                    totalUserMessages: totalUserMsgs,
                    totalAIMessages: totalAIMsgs,
                    totalWords: totalUserWords + totalAIWords,
                    avgResponseTime: avgResponseTime
                }
            };
            var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'lord-ai-data-' + new Date().toISOString().split('T')[0] + '.json';
            a.click();
            URL.revokeObjectURL(url);
            toast('✓ تم تصدير البيانات');
        };

        window.clearAnalytics = function() {
            if (!confirm('هل أنت متأكد من مسح جميع بيانات التحليلات؟')) return;
            localStorage.removeItem('lord_analytics');
            toast('✓ تم مسح التحليلات');
            setTimeout(function() { location.reload(); }, 500);
        };

    })();
    </script>
</body>
</html>
