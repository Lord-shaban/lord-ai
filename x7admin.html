<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LORD AI — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23333'/><text x='50' y='67' font-size='48' font-weight='bold' fill='white' text-anchor='middle'>L</text></svg>">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{--bg0:#09090b;--bg1:#111113;--bg2:#18181b;--bg3:#27272a;--bg4:#3f3f46;--tx1:#fafafa;--tx2:#a1a1aa;--tx3:#52525b;--ac:#6366f1;--ac2:#818cf8;--gn:#22c55e;--rd:#ef4444;--bl:#3b82f6;--or:#f59e0b;--pu:#a855f7;--cy:#06b6d4;--r:12px;--rs:8px;--f:'Inter','Noto Sans Arabic',sans-serif;--m:'JetBrains Mono',monospace}
        body{font-family:var(--f);background:var(--bg0);color:var(--tx1);min-height:100vh}

        /* LOGIN */
        .login-o{position:fixed;inset:0;background:var(--bg0);display:flex;align-items:center;justify-content:center;z-index:999}
        .login-o.off{display:none}
        .login-b{background:var(--bg1);border:1px solid var(--bg3);border-radius:16px;padding:40px;width:380px;max-width:90vw;text-align:center}
        .login-i{width:56px;height:56px;background:linear-gradient(135deg,var(--ac),var(--pu));border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:24px;color:#fff;margin-bottom:16px}
        .login-b h2{font-size:18px;margin-bottom:4px}
        .login-b p{font-size:12px;color:var(--tx3);margin-bottom:20px}
        .lin{width:100%;padding:12px;border-radius:var(--rs);border:1px solid var(--bg3);background:var(--bg2);color:var(--tx1);font-family:var(--f);font-size:14px;outline:none;text-align:center;letter-spacing:2px;margin-bottom:14px}
        .lin:focus{border-color:var(--ac)}
        .lin.err{border-color:var(--rd);animation:shake .4s}
        .lbtn{width:100%;padding:11px;border-radius:var(--rs);border:none;background:var(--ac);color:#fff;font-family:var(--f);font-size:14px;font-weight:600;cursor:pointer}
        .lbtn:hover{background:var(--ac2)}
        @keyframes shake{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-6px)}50%{transform:translateX(6px)}}

        /* LAYOUT */
        .d{max-width:1400px;margin:0 auto;padding:20px}

        /* HEADER */
        .hd{display:flex;align-items:center;justify-content:space-between;padding:14px 0 18px;border-bottom:1px solid var(--bg3);margin-bottom:20px;flex-wrap:wrap;gap:12px}
        .lo{display:flex;align-items:center;gap:12px}
        .lo-i{width:38px;height:38px;background:linear-gradient(135deg,var(--ac),var(--pu));border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff}
        .lo h1{font-size:17px;font-weight:700}.lo span{font-size:10px;color:var(--tx3);display:block}
        .hb{display:flex;gap:8px;flex-wrap:wrap}
        .bt{padding:7px 14px;border-radius:var(--rs);border:1px solid var(--bg3);background:var(--bg2);color:var(--tx2);font-family:var(--f);font-size:11px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:5px;text-decoration:none;transition:all .15s}
        .bt:hover{background:var(--bg3);color:var(--tx1)}

        /* STATUS */
        .st{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--bg1);border:1px solid var(--bg3);border-radius:var(--r);margin-bottom:18px;font-size:11px;color:var(--tx2);flex-wrap:wrap}
        .dt{width:7px;height:7px;background:var(--gn);border-radius:50%;box-shadow:0 0 6px var(--gn);animation:pu 2s ease infinite}
        @keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}
        .sp{width:1px;height:12px;background:var(--bg3)}

        /* CARDS */
        .cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
        .cd{background:var(--bg1);border:1px solid var(--bg3);border-radius:var(--r);padding:16px;transition:all .25s;position:relative;overflow:hidden}
        .cd:hover{border-color:var(--bg4);transform:translateY(-1px);box-shadow:0 6px 16px rgba(0,0,0,.2)}
        .cd::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
        .cd.cg1::before{background:var(--gn)}.cd.cb::before{background:var(--bl)}.cd.cp::before{background:var(--pu)}
        .cd.co::before{background:var(--or)}.cd.cr::before{background:var(--rd)}.cd.cc::before{background:var(--cy)}
        .cd-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
        .cd-l{font-size:10px;color:var(--tx3);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
        .cd-e{font-size:15px}
        .cd-v{font-size:26px;font-weight:800;letter-spacing:-1.5px;line-height:1;margin-bottom:3px;font-family:var(--m)}
        .cd-s{font-size:10px;color:var(--tx3)}

        /* SECTIONS */
        .g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
        .fw{grid-column:1/-1}
        .sc{background:var(--bg1);border:1px solid var(--bg3);border-radius:var(--r);overflow:hidden}
        .sh{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--bg3)}
        .stl{font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px}
        .sb{padding:16px}

        /* BARS */
        .brs{display:flex;align-items:flex-end;gap:5px;height:140px}
        .brc{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
        .br{width:100%;min-height:3px;border-radius:3px 3px 0 0;background:linear-gradient(180deg,var(--ac),rgba(99,102,241,.2));transition:height .6s ease}
        .bl2{font-size:8px;color:var(--tx3);font-family:var(--m)}
        .bv{font-size:8px;color:var(--tx2);font-family:var(--m);font-weight:600}

        /* TABLE */
        .tw{overflow-x:auto}
        table{width:100%;border-collapse:collapse}
        th{text-align:right;padding:8px 12px;font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--bg3)}
        td{padding:8px 12px;font-size:11px;color:var(--tx2);border-bottom:1px solid var(--bg3)}
        tr:last-child td{border:none}
        tr:hover td{background:var(--bg2)}
        .bg{display:inline-flex;padding:2px 8px;border-radius:12px;font-size:9px;font-weight:600}
        .bg-g{background:rgba(34,197,94,.12);color:var(--gn)}.bg-b{background:rgba(59,130,246,.12);color:var(--bl)}
        .bg-o{background:rgba(245,158,11,.12);color:var(--or)}

        /* PROGRESS */
        .pi{margin-bottom:12px}.pi:last-child{margin-bottom:0}
        .pi label{font-size:11px;color:var(--tx2);display:flex;justify-content:space-between;margin-bottom:4px}
        .pt{width:100%;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
        .pf{height:100%;border-radius:3px;transition:width .8s ease}

        /* PERF */
        .pr{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg2);border-radius:var(--rs);margin-bottom:6px}
        .pr:last-child{margin-bottom:0}
        .pr span:first-child{font-size:11px;color:var(--tx2)}
        .pr span:last-child{font-size:12px;font-weight:700;font-family:var(--m)}

        /* FEED */
        .fd{max-height:300px;overflow-y:auto}
        .fi{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--bg3)}
        .fi:last-child{border:none}
        .fd2{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0}
        .fd2.v{background:var(--bl)}.fd2.m{background:var(--gn)}.fd2.e{background:var(--rd)}
        .ft{flex:1}.ft p{font-size:11px;color:var(--tx2)}.ft small{font-size:9px;color:var(--tx3)}

        /* LOADING / EMPTY */
        .ld{display:flex;align-items:center;justify-content:center;padding:30px;gap:8px;color:var(--tx3);font-size:12px}
        .sn{width:16px;height:16px;border:2px solid var(--bg3);border-top-color:var(--ac);border-radius:50%;animation:sp .6s linear infinite}
        @keyframes sp{to{transform:rotate(360deg)}}
        .em{text-align:center;padding:30px;color:var(--tx3);font-size:12px}

        /* DEBUG */
        .dbg{margin-top:16px;background:var(--bg1);border:1px solid var(--bg3);border-radius:var(--r);padding:14px;font-family:var(--m);font-size:10px;color:var(--tx3);white-space:pre-wrap;max-height:200px;overflow-y:auto;display:none}
        .dbg.on{display:block}

        /* TOAST */
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);color:var(--tx1);padding:9px 20px;border-radius:var(--rs);font-size:12px;border:1px solid var(--bg4);opacity:0;transition:all .3s;z-index:100}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

        /* ANIM */
        @keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        .cd{animation:fu .4s ease both}
        .cd:nth-child(1){animation-delay:.03s}.cd:nth-child(2){animation-delay:.06s}
        .cd:nth-child(3){animation-delay:.09s}.cd:nth-child(4){animation-delay:.12s}
        .cd:nth-child(5){animation-delay:.15s}.cd:nth-child(6){animation-delay:.18s}
        .cd:nth-child(7){animation-delay:.21s}.cd:nth-child(8){animation-delay:.24s}

        @media(max-width:900px){.g2{grid-template-columns:1fr}}
        @media(max-width:600px){.cg{grid-template-columns:repeat(2,1fr);gap:8px}.hd{flex-direction:column;align-items:flex-start}.cd-v{font-size:20px}}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-o" id="loginO">
    <div class="login-b">
        <div class="login-i">L</div>
        <h2>لوحة تحكم الأدمن</h2>
        <p>أدخل كلمة المرور</p>
        <input type="password" class="lin" id="lp" placeholder="••••••••" autofocus>
        <button class="lbtn" id="lb">دخول</button>
    </div>
</div>

<!-- DASHBOARD -->
<div class="d" id="dc" style="display:none">
    <header class="hd">
        <div class="lo"><div class="lo-i">L</div><div><h1>لوحة تحكم الأدمن</h1><span>LORD AI Dashboard</span></div></div>
        <div class="hb">
            <button class="bt" onclick="load()">🔄 تحديث</button>
            <a href="index.html" class="bt">💬 الشات</a>
            <button class="bt" onclick="exprt()">📥 تصدير</button>
            <button class="bt" onclick="toggleDbg()">🐛 Debug</button>
            <button class="bt" onclick="logoutA()">🚪 خروج</button>
        </div>
    </header>
    <div class="st">
        <div class="dt"></div><span>النظام يعمل</span><div class="sp"></div>
        <span>النموذج: <b>Llama 3.3 70B</b></span><div class="sp"></div>
        <span id="fbs">Firebase: ⏳</span><div class="sp"></div>
        <span id="lr">آخر تحديث: —</span><div class="sp"></div>
        <span id="lc">السجلات: —</span>
    </div>

    <div class="cg" id="cards"></div>

    <div class="g2">
        <div class="sc fw"><div class="sh"><div class="stl">📈 نشاط آخر 14 يوم</div></div><div class="sb"><div class="brs" id="chart"><div class="ld"><div class="sn"></div></div></div></div></div>
        <div class="sc"><div class="sh"><div class="stl">⚡ آخر الأحداث</div></div><div class="sb"><div class="fd" id="feed"><div class="ld"><div class="sn"></div></div></div></div></div>
        <div class="sc"><div class="sh"><div class="stl">🚀 الأداء</div></div><div class="sb" id="perf"><div class="ld"><div class="sn"></div></div></div></div>
        <div class="sc"><div class="sh"><div class="stl">🌐 اللغات</div></div><div class="sb" id="langs"><div class="ld"><div class="sn"></div></div></div></div>
        <div class="sc"><div class="sh"><div class="stl">💻 الأجهزة</div></div><div class="sb" id="devs"><div class="ld"><div class="sn"></div></div></div></div>
        <div class="sc fw"><div class="sh"><div class="stl">👤 المستخدمون</div><span style="font-size:10px;color:var(--tx3)" id="uc"></span></div><div class="sb" style="padding:0"><div class="tw" id="utbl"><div class="ld"><div class="sn"></div></div></div></div></div>
    </div>

    <div class="dbg" id="dbg"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
(function(){
    var db=null, logs=[], dbgEl, dbgOn=false;

    function dbg(m){if(dbgEl){dbgEl.textContent+=new Date().toLocaleTimeString()+' '+m+'\n';dbgEl.scrollTop=dbgEl.scrollHeight}}
    function toast(m){var o=document.querySelector('.toast');if(o)o.remove();var t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);requestAnimationFrame(function(){t.classList.add('show')});setTimeout(function(){t.classList.remove('show');setTimeout(function(){t.remove()},300)},2500)}
    function fN(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return(n||0).toString()}
    function tAgo(ts){if(!ts)return'—';var d=(Date.now()-ts)/1000;if(d<60)return'الآن';if(d<3600)return Math.floor(d/60)+' دقيقة';if(d<86400)return Math.floor(d/3600)+' ساعة';return Math.floor(d/86400)+' يوم'}
    function pUA(ua){if(!ua)return'غير معروف';if(/iPhone|iPad/.test(ua))return'📱 iOS';if(/Android/.test(ua))return'📱 Android';if(/Windows/.test(ua))return'💻 Windows';if(/Mac/.test(ua))return'💻 macOS';if(/Linux/.test(ua))return'🐧 Linux';return'🌐 آخر'}

    /* AUTH */
    var lp=document.getElementById('lp'),lb=document.getElementById('lb');
    function doLogin(){
        if(typeof ADMIN_PASSWORD!=='undefined'&&lp.value.trim()===ADMIN_PASSWORD){
            sessionStorage.setItem('la','1');show();
        }else{lp.classList.add('err');setTimeout(function(){lp.classList.remove('err')},500)}
    }
    lb.onclick=doLogin;lp.onkeydown=function(e){if(e.key==='Enter')doLogin()};
    window.logoutA=function(){sessionStorage.removeItem('la');location.reload()};
    window.toggleDbg=function(){dbgOn=!dbgOn;dbgEl.classList.toggle('on',dbgOn)};

    function show(){
        document.getElementById('loginO').classList.add('off');
        document.getElementById('dc').style.display='';
        dbgEl=document.getElementById('dbg');
        initFB();
    }

    if(sessionStorage.getItem('la')==='1')show();

    /* FIREBASE */
    function initFB(){
        dbg('Initializing Firebase...');
        try{
            if(typeof firebase==='undefined'){dbg('ERROR: firebase SDK not loaded');document.getElementById('fbs').innerHTML='Firebase: <b style="color:var(--rd)">SDK غير محمّل</b>';return}
            if(typeof FIREBASE_CONFIG==='undefined'||!FIREBASE_CONFIG.projectId){dbg('ERROR: FIREBASE_CONFIG missing');document.getElementById('fbs').innerHTML='Firebase: <b style="color:var(--rd)">غير مُعد</b>';return}
            if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);
            db=firebase.firestore();
            dbg('Firebase connected: '+FIREBASE_CONFIG.projectId);
            document.getElementById('fbs').innerHTML='Firebase: <b style="color:var(--gn)">متصل ✓</b>';
            load();
        }catch(e){
            dbg('ERROR: '+e.message);
            document.getElementById('fbs').innerHTML='Firebase: <b style="color:var(--rd)">خطأ</b>';
        }
    }

    /* LOAD ALL DATA */
    window.load=function(){
        if(!db){toast('Firebase غير متصل');return}
        dbg('Loading logs from lord_logs...');
        document.getElementById('lr').textContent='آخر تحديث: الآن';

        db.collection('lord_logs').orderBy('t','desc').limit(2000).get().then(function(snap){
            logs=[];
            snap.forEach(function(doc){logs.push(doc.data())});
            dbg('Loaded '+logs.length+' logs');
            document.getElementById('lc').textContent='السجلات: '+logs.length;
            render();
        }).catch(function(e){
            dbg('ERROR loading: '+e.message);
            toast('خطأ: '+e.message);
            document.getElementById('lc').textContent='السجلات: خطأ!';
        });
    };

    /* RENDER */
    function render(){
        var visits=0, msgs=0, userMsgs=0, aiMsgs=0, errors=0;
        var userWords=0, aiWords=0;
        var visitors={}, arC=0, enC=0, rts=[], devices={}, screens={};
        var daily={}, hourly=new Array(24).fill(0);

        // Init 14 days
        for(var i=13;i>=0;i--){var dt=new Date();dt.setDate(dt.getDate()-i);daily[dt.toISOString().split('T')[0]]={v:0,m:0}}

        for(var j=0;j<logs.length;j++){
            var L=logs[j];
            var vid=L.vid||'unknown';
            var day=new Date(L.t).toISOString().split('T')[0];
            var hr=new Date(L.t).getHours();
            hourly[hr]++;

            if(!visitors[vid])visitors[vid]={msgs:0,visits:0,last:0,ua:L.ua||'',scr:L.scr||'',lang:L.lang||''};
            if(L.t>visitors[vid].last)visitors[vid].last=L.t;
            if(L.ua){visitors[vid].ua=L.ua}
            if(L.scr){visitors[vid].scr=L.scr}

            if(L.type==='visit'){
                visits++;
                visitors[vid].visits++;
                if(day in daily)daily[day].v++;
            }
            else if(L.type==='msg'){
                msgs++;
                if(L.role==='user'){userMsgs++;userWords+=(L.words||0);visitors[vid].msgs++}
                else{aiMsgs++;aiWords+=(L.words||0)}
                if(L.mlang==='ar')arC++;else if(L.mlang==='en')enC++;
                if(L.rt)rts.push(L.rt);
                if(day in daily)daily[day].m++;
            }
            else if(L.type==='error'){errors++}

            var dev=pUA(L.ua);
            devices[dev]=(devices[dev]||0)+1;
            if(L.scr)screens[L.scr]=(screens[L.scr]||0)+1;
        }

        var uCount=Object.keys(visitors).length;
        var avgRT=rts.length?Math.round(rts.reduce(function(a,b){return a+b},0)/rts.length):0;
        var minRT=rts.length?Math.min.apply(null,rts):0;
        var maxRT=rts.length?Math.max.apply(null,rts):0;

        // Active today
        var today=new Date().toISOString().split('T')[0];
        var activeToday=0;
        for(var vk in visitors){
            if(new Date(visitors[vk].last).toISOString().split('T')[0]===today)activeToday++;
        }

        dbg('Stats: visitors='+uCount+' visits='+visits+' msgs='+msgs+' errors='+errors);

        /* CARDS */
        var cards=[
            {l:'الزوار الفريدين',v:fN(uCount),e:'👥',c:'cb',s:'مستخدم مختلف'},
            {l:'مشاهدات الصفحة',v:fN(visits),e:'👁️',c:'cc',s:'إجمالي الزيارات'},
            {l:'نشطون اليوم',v:fN(activeToday),e:'🟢',c:'cg1',s:'مستخدمون نشطون اليوم'},
            {l:'إجمالي الرسائل',v:fN(msgs),e:'💬',c:'cb',s:'مستخدم: '+fN(userMsgs)+' · ذكاء: '+fN(aiMsgs)},
            {l:'أسئلة المستخدمين',v:fN(userMsgs),e:'❓',c:'co',s:'إجمالي الأسئلة المرسلة'},
            {l:'ردود الذكاء',v:fN(aiMsgs),e:'🤖',c:'cp',s:fN(aiWords)+' كلمة مولّدة'},
            {l:'الكلمات',v:fN(userWords+aiWords),e:'📝',c:'cp',s:'مستخدم: '+fN(userWords)+' · ذكاء: '+fN(aiWords)},
            {l:'الأخطاء',v:fN(errors),e:'⚠️',c:'cr',s:errors===0?'لا أخطاء ✓':'أخطاء API'},
        ];
        var ch='';
        for(var ci=0;ci<cards.length;ci++){
            var c=cards[ci];
            ch+='<div class="cd '+c.c+'"><div class="cd-h"><span class="cd-l">'+c.l+'</span><span class="cd-e">'+c.e+'</span></div><div class="cd-v">'+c.v+'</div><div class="cd-s">'+c.s+'</div></div>';
        }
        document.getElementById('cards').innerHTML=ch;

        /* DAILY CHART */
        var dKeys=Object.keys(daily);
        var maxD=1;
        for(var dk in daily){var tot=daily[dk].v+daily[dk].m;if(tot>maxD)maxD=tot}
        var barH='';
        for(var bi=0;bi<dKeys.length;bi++){
            var bk=dKeys[bi],bTotal=daily[bk].v+daily[bk].m;
            var h=Math.max(3,(bTotal/maxD)*120);
            barH+='<div class="brc"><span class="bv">'+(bTotal||'')+'</span><div class="br" style="height:'+h+'px" title="'+bk+'&#10;زيارات: '+daily[bk].v+'&#10;رسائل: '+daily[bk].m+'"></div><span class="bl2">'+bk.slice(8)+'</span></div>';
        }
        document.getElementById('chart').innerHTML=barH;

        /* FEED */
        var feedH='';
        var recent=logs.slice(0,30);
        if(!recent.length){feedH='<div class="em">لا أحداث بعد</div>'}
        else{
            for(var fi=0;fi<recent.length;fi++){
                var F=recent[fi];
                var dc=F.type==='visit'?'v':F.type==='msg'?'m':'e';
                var desc='';
                if(F.type==='visit')desc='🔵 زيارة صفحة';
                else if(F.type==='msg')desc=(F.role==='user'?'🟢 رسالة مستخدم':'🟢 رد ذكاء')+' ('+fN(F.words||0)+' كلمة)';
                else desc='🔴 خطأ: '+(F.err||'').substring(0,50);
                feedH+='<div class="fi"><div class="fd2 '+dc+'"></div><div class="ft"><p>'+desc+'</p><small>'+tAgo(F.t)+' · '+(F.vid||'').substring(0,10)+'</small></div></div>';
            }
        }
        document.getElementById('feed').innerHTML=feedH;

        /* PERFORMANCE */
        document.getElementById('perf').innerHTML=
            '<div class="pr"><span>متوسط وقت الاستجابة</span><span style="color:var(--gn)">'+(avgRT?(avgRT/1000).toFixed(1)+' ثانية':'غير متوفر')+'</span></div>'
            +'<div class="pr"><span>أسرع استجابة</span><span style="color:var(--bl)">'+(minRT?(minRT/1000).toFixed(1)+' ثانية':'—')+'</span></div>'
            +'<div class="pr"><span>أبطأ استجابة</span><span style="color:var(--or)">'+(maxRT?(maxRT/1000).toFixed(1)+' ثانية':'—')+'</span></div>'
            +'<div class="pr"><span>عدد القياسات</span><span style="color:var(--tx2)">'+rts.length+'</span></div>'
            +'<div class="pr"><span>نسبة النجاح</span><span style="color:var(--gn)">'+(msgs>0?Math.round((msgs/(msgs+errors))*100)+'%':'—')+'</span></div>';

        /* LANGUAGES */
        var tL=arC+enC||1;
        var arP=Math.round((arC/tL)*100),enP=100-arP;
        document.getElementById('langs').innerHTML=
            '<div class="pi"><label><span>🇸🇦 العربية</span><b>'+arP+'% ('+arC+')</b></label><div class="pt"><div class="pf" style="width:'+arP+'%;background:linear-gradient(90deg,var(--ac),var(--pu))"></div></div></div>'
            +'<div class="pi"><label><span>🇺🇸 الإنجليزية</span><b>'+enP+'% ('+enC+')</b></label><div class="pt"><div class="pf" style="width:'+enP+'%;background:linear-gradient(90deg,var(--bl),var(--cy))"></div></div></div>';

        /* DEVICES */
        var devArr=Object.entries(devices).sort(function(a,b){return b[1]-a[1]});
        var devT=devArr.reduce(function(s,e){return s+e[1]},0)||1;
        var colors=['var(--ac)','var(--gn)','var(--bl)','var(--or)','var(--pu)','var(--cy)'];
        var devH='';
        for(var di=0;di<devArr.length;di++){
            var dp=Math.round((devArr[di][1]/devT)*100);
            devH+='<div class="pi"><label><span>'+devArr[di][0]+'</span><b>'+dp+'% ('+devArr[di][1]+')</b></label><div class="pt"><div class="pf" style="width:'+dp+'%;background:'+colors[di%6]+'"></div></div></div>';
        }
        document.getElementById('devs').innerHTML=devH||'<div class="em">لا بيانات</div>';

        /* USERS TABLE */
        var vArr=Object.entries(visitors).sort(function(a,b){return b[1].last-a[1].last});
        document.getElementById('uc').textContent='إجمالي: '+vArr.length;
        if(!vArr.length){document.getElementById('utbl').innerHTML='<div class="em">لا مستخدمون بعد</div>';return}
        var tbl='<table><thead><tr><th>المعرف</th><th>الجهاز</th><th>الشاشة</th><th>الرسائل</th><th>الزيارات</th><th>آخر ظهور</th><th>الحالة</th></tr></thead><tbody>';
        for(var ui=0;ui<Math.min(vArr.length,50);ui++){
            var uid=vArr[ui][0],uv=vArr[ui][1];
            var online=(Date.now()-uv.last)<300000;
            tbl+='<tr><td style="font-family:var(--m);font-size:10px;color:var(--tx1)">'+uid.substring(0,14)+'</td>'
                +'<td>'+pUA(uv.ua)+'</td>'
                +'<td style="font-family:var(--m);font-size:10px">'+(uv.scr||'—')+'</td>'
                +'<td style="font-weight:600">'+uv.msgs+'</td>'
                +'<td>'+uv.visits+'</td>'
                +'<td style="font-size:10px">'+tAgo(uv.last)+'</td>'
                +'<td>'+(online?'<span class="bg bg-g">متصل</span>':'<span class="bg bg-b">غير متصل</span>')+'</td></tr>';
        }
        tbl+='</tbody></table>';
        document.getElementById('utbl').innerHTML=tbl;
    }

    /* EXPORT */
    window.exprt=function(){
        var data={exportDate:new Date().toISOString(),logsCount:logs.length,logs:logs};
        var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
        var a=document.createElement('a');a.href=URL.createObjectURL(blob);
        a.download='lord-admin-'+new Date().toISOString().split('T')[0]+'.json';a.click();
        toast('✓ تم التصدير');
    };

    /* AUTO REFRESH */
    setInterval(function(){if(db&&sessionStorage.getItem('la')==='1')window.load()},120000);
})();
</script>
</body>
</html>
