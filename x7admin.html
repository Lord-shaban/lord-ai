<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LORD AI — Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--b0:#141514;--b1:#1b1d1c;--b2:#232525;--b3:#333635;--b4:#434645;--t1:#e9ebe9;--t2:#b2b7b3;--t3:#7d827e;--ac:#62b3a1;--gn:#22c55e;--rd:#ef4444;--bl:#5b8def;--or:#f59e0b;--pu:#4a9d8c;--cy:#06b6d4;--r:14px;--f:'Inter','Noto Sans Arabic',sans-serif;--m:'JetBrains Mono',monospace}
        body{font-family:var(--f);background:var(--b0);color:var(--t1);min-height:100vh}

        .login-w{position:fixed;inset:0;background:var(--b0);display:flex;align-items:center;justify-content:center;z-index:99}
        .login-w.off{display:none}
        .lbox{background:var(--b1);border:1px solid var(--b3);border-radius:16px;padding:36px;width:360px;max-width:90vw;text-align:center}
        .lbox .ic{width:52px;height:52px;background:linear-gradient(135deg,var(--ac),var(--pu));border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;color:#fff;margin-bottom:14px}
        .lbox h2{font-size:17px;margin-bottom:4px}.lbox p{font-size:11px;color:var(--t3);margin-bottom:18px}
        .linp{width:100%;padding:11px;border-radius:8px;border:1px solid var(--b3);background:var(--b2);color:var(--t1);font-family:var(--f);font-size:14px;outline:none;text-align:center;letter-spacing:2px;margin-bottom:12px}
        .linp:focus{border-color:var(--ac)}.linp.err{border-color:var(--rd);animation:shake .35s}
        .lbtn{width:100%;padding:10px;border-radius:8px;border:none;background:var(--ac);color:#fff;font-family:var(--f);font-size:14px;font-weight:600;cursor:pointer}
        @keyframes shake{25%,75%{transform:translateX(-5px)}50%{transform:translateX(5px)}}

        .D{max-width:1400px;margin:0 auto;padding:18px}
        .hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;border-bottom:1px solid var(--b3);margin-bottom:18px;flex-wrap:wrap;gap:10px}
        .logo{display:flex;align-items:center;gap:10px}
        .logo i{width:36px;height:36px;background:linear-gradient(135deg,var(--ac),var(--pu));border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;font-style:normal}
        .logo h1{font-size:16px}.logo span{font-size:10px;color:var(--t3);display:block}
        .hbtns{display:flex;gap:6px;flex-wrap:wrap}
        .bt{padding:6px 12px;border-radius:7px;border:1px solid var(--b3);background:var(--b2);color:var(--t2);font-family:var(--f);font-size:11px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;text-decoration:none;transition:all .15s}
        .bt:hover{background:var(--b3);color:var(--t1)}

        /* Alert banner */
        .alert{padding:12px 16px;border-radius:var(--r);margin-bottom:16px;font-size:12px;display:none}
        .alert.on{display:block}
        .alert.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--gn)}
        .alert.bad{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--rd)}
        .alert.warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--or)}

        .cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:18px}
        .cd{background:var(--b1);border:1px solid var(--b3);border-radius:var(--r);padding:14px;position:relative;overflow:hidden;animation:fu .4s ease both}
        .cd::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
        .cd.g::before{background:var(--gn)}.cd.b::before{background:var(--bl)}.cd.p::before{background:var(--pu)}
        .cd.o::before{background:var(--or)}.cd.r::before{background:var(--rd)}.cd.c::before{background:var(--cy)}
        .cd-h{display:flex;justify-content:space-between;margin-bottom:8px}
        .cd-l{font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase}
        .cd-v{font-size:24px;font-weight:800;letter-spacing:-1px;font-family:var(--m)}
        .cd-s{font-size:10px;color:var(--t3)}
        @keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

        .g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
        .fw{grid-column:1/-1}
        .sc{background:var(--b1);border:1px solid var(--b3);border-radius:var(--r);overflow:hidden}
        .sh{padding:10px 14px;border-bottom:1px solid var(--b3);font-size:12px;font-weight:600}
        .sb{padding:14px}
        .brs{display:flex;align-items:flex-end;gap:4px;height:130px}
        .brc{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
        .br{width:100%;min-height:2px;border-radius:2px 2px 0 0;background:linear-gradient(180deg,var(--ac),rgba(98,179,161,.2))}
        .bl2{font-size:8px;color:var(--t3);font-family:var(--m)}.bv{font-size:8px;color:var(--t2);font-family:var(--m);font-weight:600}
        table{width:100%;border-collapse:collapse}
        th{text-align:right;padding:7px 10px;font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;border-bottom:1px solid var(--b3)}
        td{padding:7px 10px;font-size:11px;color:var(--t2);border-bottom:1px solid var(--b3)}
        tr:last-child td{border:none}tr:hover td{background:var(--b2)}
        .bg{padding:2px 7px;border-radius:10px;font-size:9px;font-weight:600}
        .bg-g{background:rgba(34,197,94,.12);color:var(--gn)}.bg-b{background:rgba(59,130,246,.12);color:var(--bl)}
        .pi{margin-bottom:10px}.pi:last-child{margin-bottom:0}
        .pi label{font-size:11px;color:var(--t2);display:flex;justify-content:space-between;margin-bottom:3px}
        .pt{width:100%;height:6px;background:var(--b3);border-radius:3px;overflow:hidden}
        .pf{height:100%;border-radius:3px}
        .pr{display:flex;justify-content:space-between;padding:7px 10px;background:var(--b2);border-radius:7px;margin-bottom:5px;font-size:11px}
        .pr:last-child{margin-bottom:0}
        .fd{max-height:280px;overflow-y:auto}
        .fi{display:flex;gap:7px;padding:7px 0;border-bottom:1px solid var(--b3);font-size:11px;color:var(--t2)}
        .fi:last-child{border:none}
        .fi small{font-size:9px;color:var(--t3)}
        .em{text-align:center;padding:24px;color:var(--t3);font-size:12px}
        .ld{text-align:center;padding:24px;color:var(--t3);font-size:12px}
        #log{margin-top:14px;background:var(--b1);border:1px solid var(--b3);border-radius:var(--r);padding:12px;font-family:var(--m);font-size:10px;color:var(--t3);white-space:pre-wrap;max-height:250px;overflow-y:auto}
        @media(max-width:900px){.g2{grid-template-columns:1fr}}
        @media(max-width:600px){.cg{grid-template-columns:repeat(2,1fr);gap:8px}.hdr{flex-direction:column;align-items:flex-start}}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--b3);border-radius:2px}
    </style>
</head>
<body>

<div class="login-w" id="LW">
    <div class="lbox">
        <div class="ic">L</div>
        <h2>لوحة تحكم الأدمن</h2>
        <p>أدخل كلمة المرور</p>
        <input type="password" class="linp" id="LP" placeholder="••••••••" autofocus>
        <button class="lbtn" id="LB">دخول</button>
    </div>
</div>

<div class="D" id="DC" style="display:none">
    <header class="hdr">
        <div class="logo"><i>L</i><div><h1>لوحة تحكم الأدمن</h1><span>LORD AI Admin</span></div></div>
        <div class="hbtns">
            <button class="bt" onclick="testConn()">🔌 اختبار الاتصال</button>
            <button class="bt" onclick="loadData()">🔄 تحديث</button>
            <a href="index.html" class="bt">💬 الشات</a>
            <button class="bt" onclick="doExport()">📥 تصدير</button>
            <button class="bt" onclick="doLogout()">🚪 خروج</button>
        </div>
    </header>

    <div class="alert" id="alertBox"></div>
    <div class="cg" id="cards"><div class="ld">⏳ جاري التحميل...</div></div>
    <div class="g2">
        <div class="sc fw"><div class="sh">📈 نشاط آخر 14 يوم</div><div class="sb"><div class="brs" id="chart"><div class="ld">⏳</div></div></div></div>
        <div class="sc"><div class="sh">⚡ آخر الأحداث</div><div class="sb"><div class="fd" id="feed"><div class="ld">⏳</div></div></div></div>
        <div class="sc"><div class="sh">🚀 الأداء</div><div class="sb" id="perf"><div class="ld">⏳</div></div></div>
        <div class="sc"><div class="sh">🌐 اللغات</div><div class="sb" id="langs"><div class="ld">⏳</div></div></div>
        <div class="sc"><div class="sh">💻 الأجهزة</div><div class="sb" id="devs"><div class="ld">⏳</div></div></div>
        <div class="sc fw"><div class="sh">👤 المستخدمون <span style="float:left;color:var(--t3);font-weight:400" id="uc"></span></div><div class="sb" style="padding:0"><div id="utbl"><div class="ld">⏳</div></div></div></div>
    </div>
    <div id="log"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
var db=null,allLogs=[];
var logEl;

function log(m){
    console.log('[ADMIN]',m);
    if(logEl){logEl.textContent+='['+new Date().toLocaleTimeString()+'] '+m+'\n';logEl.scrollTop=9999}
}

function alert2(msg,type){
    var el=document.getElementById('alertBox');
    el.className='alert on '+type;
    el.innerHTML=msg;
}

function fN(n){return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':(n||0).toString()}
function tAgo(ts){if(!ts)return'—';var d=(Date.now()-ts)/1000;if(d<60)return'الآن';if(d<3600)return Math.floor(d/60)+' د';if(d<86400)return Math.floor(d/3600)+' س';return Math.floor(d/86400)+' يوم'}
function pUA(ua){if(!ua)return'?';if(/iPhone|iPad/.test(ua))return'📱iOS';if(/Android/.test(ua))return'📱Android';if(/Windows/.test(ua))return'💻Win';if(/Mac/.test(ua))return'💻Mac';if(/Linux/.test(ua))return'🐧Linux';return'🌐Other'}

/* AUTH */
document.getElementById('LB').onclick=function(){
    if(typeof ADMIN_PASSWORD!=='undefined'&&document.getElementById('LP').value.trim()===ADMIN_PASSWORD){
        sessionStorage.setItem('la','1');showDash();
    }else{document.getElementById('LP').classList.add('err');setTimeout(function(){document.getElementById('LP').classList.remove('err')},400)}
};
document.getElementById('LP').onkeydown=function(e){if(e.key==='Enter')document.getElementById('LB').click()};
window.doLogout=function(){sessionStorage.removeItem('la');location.reload()};

function showDash(){
    document.getElementById('LW').classList.add('off');
    document.getElementById('DC').style.display='';
    logEl=document.getElementById('log');
    initFB();
}
if(sessionStorage.getItem('la')==='1')showDash();

/* FIREBASE INIT */
function initFB(){
    log('Starting Firebase init...');

    if(typeof firebase==='undefined'){
        log('ERROR: Firebase SDK not loaded!');
        alert2('❌ Firebase SDK غير محمّل — تأكد من اتصال الإنترنت','bad');
        return;
    }
    log('Firebase SDK loaded ✓');

    if(typeof FIREBASE_CONFIG==='undefined'||!FIREBASE_CONFIG.projectId){
        log('ERROR: FIREBASE_CONFIG not found');
        alert2('❌ إعدادات Firebase غير موجودة — تحقق من firebase-config.js','bad');
        return;
    }
    log('Config found: project='+FIREBASE_CONFIG.projectId);

    try{
        if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
        db=firebase.firestore();
        log('Firestore initialized ✓');
        // Auto test
        testConn();
    }catch(e){
        log('ERROR init: '+e.message);
        alert2('❌ خطأ في تهيئة Firebase: '+e.message,'bad');
    }
}

/* TEST CONNECTION */
window.testConn=function(){
    if(!db){alert2('❌ Firebase غير متصل','bad');return}
    log('Testing Firestore connection...');
    alert2('⏳ جاري اختبار الاتصال بـ Firestore...','warn');

    var testDoc={type:'_test',t:Date.now(),msg:'connection test'};

    // Step 1: Try to WRITE
    db.collection('lord_logs').add(testDoc).then(function(ref){
        log('WRITE SUCCESS ✓ doc id='+ref.id);

        // Step 2: Try to READ it back
        ref.get().then(function(snap){
            if(snap.exists){
                log('READ SUCCESS ✓ data='+JSON.stringify(snap.data()));
                alert2('✅ <b>Firebase يعمل بنجاح!</b> — الكتابة والقراءة تعملان. جاري تحميل البيانات...','ok');

                // Delete test doc
                ref.delete().catch(function(){});

                // Now load real data
                loadData();
            }else{
                log('READ FAIL: doc not found');
                alert2('⚠️ تمت الكتابة لكن القراءة فشلت','warn');
            }
        }).catch(function(e){
            log('READ ERROR: '+e.message);
            alert2('⚠️ تمت الكتابة لكن القراءة فشلت: '+e.message,'warn');
        });

    }).catch(function(e){
        log('WRITE ERROR: '+e.message);

        if(e.message.indexOf('PERMISSION_DENIED')!==-1||e.message.indexOf('permission')!==-1){
            alert2('❌ <b>خطأ صلاحيات Firestore!</b><br><br>الحل: اذهب إلى <a href="https://console.firebase.google.com/project/'+FIREBASE_CONFIG.projectId+'/firestore/rules" target="_blank" style="color:var(--ac);text-decoration:underline">Firebase Console → Firestore → Rules</a> واستبدل القواعد بـ:<br><br><code style="background:var(--b2);padding:4px 8px;border-radius:4px;font-size:11px">rules_version = \'2\';\nservice cloud.firestore {\n  match /databases/{database}/documents {\n    match /{document=**} {\n      allow read, write: if true;\n    }\n  }\n}</code>','bad');
        }
        else if(e.message.indexOf('NOT_FOUND')!==-1||e.message.indexOf('not found')!==-1){
            alert2('❌ <b>Firestore Database غير مُنشأ!</b><br><br>الحل: اذهب إلى <a href="https://console.firebase.google.com/project/'+FIREBASE_CONFIG.projectId+'/firestore" target="_blank" style="color:var(--ac);text-decoration:underline">Firebase Console → Build → Firestore Database</a> → اضغط <b>Create Database</b> → اختر <b>Start in test mode</b> → <b>Create</b>','bad');
        }
        else{
            alert2('❌ خطأ في الكتابة: '+e.message,'bad');
        }
    });
};

/* LOAD DATA */
window.loadData=function(){
    if(!db){return}
    log('Loading lord_logs...');

    db.collection('lord_logs').orderBy('t','desc').limit(5000).get().then(function(snap){
        allLogs=[];
        snap.forEach(function(d){
            var data=d.data();
            if(data.type!=='_test') allLogs.push(data);
        });
        log('Loaded '+allLogs.length+' records');
        if(allLogs.length===0){
            alert2('ℹ️ لا توجد بيانات بعد — افتح <a href="index.html" style="color:var(--ac)">صفحة الشات</a> وأرسل رسالة ثم عد هنا واضغط تحديث','warn');
        }
        renderAll();
    }).catch(function(e){
        log('LOAD ERROR: '+e.message);
        alert2('❌ خطأ في تحميل البيانات: '+e.message,'bad');
    });
};

/* RENDER */
function renderAll(){
    var visits=0,msgs=0,uMsgs=0,aMsgs=0,errs=0,uWords=0,aWords=0;
    var visitors={},arC=0,enC=0,rts=[],devs={};
    var daily={};
    for(var i=13;i>=0;i--){var dt=new Date();dt.setDate(dt.getDate()-i);daily[dt.toISOString().split('T')[0]]={v:0,m:0}}
    var today=new Date().toISOString().split('T')[0];

    for(var j=0;j<allLogs.length;j++){
        var L=allLogs[j];
        var vid=L.vid||'?';
        var day=L.t?new Date(L.t).toISOString().split('T')[0]:'';
        if(!visitors[vid])visitors[vid]={msgs:0,visits:0,last:0,ua:'',scr:''};
        if(L.t>visitors[vid].last)visitors[vid].last=L.t;
        if(L.ua)visitors[vid].ua=L.ua;
        if(L.scr)visitors[vid].scr=L.scr;

        if(L.type==='visit'){
            visits++;visitors[vid].visits++;
            if(day in daily)daily[day].v++;
        }else if(L.type==='msg'){
            msgs++;
            if(L.role==='user'){uMsgs++;uWords+=(L.words||0);visitors[vid].msgs++}
            else{aMsgs++;aWords+=(L.words||0)}
            if(L.mlang==='ar')arC++;else if(L.mlang==='en')enC++;
            if(L.rt)rts.push(L.rt);
            if(day in daily)daily[day].m++;
        }else if(L.type==='error'){errs++}
        var dv=pUA(L.ua);devs[dv]=(devs[dv]||0)+1;
    }

    var uCnt=Object.keys(visitors).length;
    var activeToday=0;
    for(var vk in visitors){if(new Date(visitors[vk].last).toISOString().split('T')[0]===today)activeToday++}
    var avgRT=rts.length?Math.round(rts.reduce(function(a,b){return a+b},0)/rts.length):0;

    /* CARDS */
    var cds=[
        {l:'الزوار',v:fN(uCnt),e:'👥',c:'b',s:'زائر فريد'},
        {l:'الزيارات',v:fN(visits),e:'👁️',c:'c',s:'إجمالي مشاهدات'},
        {l:'نشطون اليوم',v:fN(activeToday),e:'🟢',c:'g',s:'نشطون اليوم'},
        {l:'الرسائل',v:fN(msgs),e:'💬',c:'b',s:'مستخدم '+fN(uMsgs)+' · ذكاء '+fN(aMsgs)},
        {l:'الأسئلة',v:fN(uMsgs),e:'❓',c:'o',s:'أسئلة المستخدمين'},
        {l:'ردود AI',v:fN(aMsgs),e:'🤖',c:'p',s:fN(aWords)+' كلمة'},
        {l:'الكلمات',v:fN(uWords+aWords),e:'📝',c:'p',s:'مستخدم '+fN(uWords)+' · AI '+fN(aWords)},
        {l:'الأخطاء',v:fN(errs),e:'⚠️',c:'r',s:errs?'أخطاء':'لا أخطاء ✓'},
    ];
    var h='';for(var ci=0;ci<cds.length;ci++){var cc=cds[ci];h+='<div class="cd '+cc.c+'" style="animation-delay:'+(ci*.04)+'s"><div class="cd-h"><span class="cd-l">'+cc.l+'</span><span>'+cc.e+'</span></div><div class="cd-v">'+cc.v+'</div><div class="cd-s">'+cc.s+'</div></div>'}
    document.getElementById('cards').innerHTML=h;

    /* CHART */
    var dk=Object.keys(daily),mx=1;
    for(var x in daily){var tt=daily[x].v+daily[x].m;if(tt>mx)mx=tt}
    var bh='';for(var bi=0;bi<dk.length;bi++){var bk=dk[bi],bt2=daily[bk].v+daily[bk].m,hh=Math.max(2,(bt2/mx)*110);bh+='<div class="brc"><span class="bv">'+(bt2||'')+'</span><div class="br" style="height:'+hh+'px;transition:height .5s" title="'+bk+'"></div><span class="bl2">'+bk.slice(8)+'</span></div>'}
    document.getElementById('chart').innerHTML=bh;

    /* FEED */
    var fh='',rc=allLogs.slice(0,25);
    if(!rc.length){fh='<div class="em">لا أحداث</div>'}
    for(var fi=0;fi<rc.length;fi++){var F=rc[fi];var desc=F.type==='visit'?'🔵 زيارة':F.type==='msg'?(F.role==='user'?'🟢 سؤال':'🟣 رد AI')+' ('+fN(F.words||0)+' كلمة)':'🔴 خطأ';fh+='<div class="fi"><span>'+desc+'</span> <small>'+tAgo(F.t)+' · '+(F.vid||'').slice(0,8)+'</small></div>'}
    document.getElementById('feed').innerHTML=fh;

    /* PERF */
    document.getElementById('perf').innerHTML='<div class="pr"><span>متوسط الاستجابة</span><span style="color:var(--gn)">'+(avgRT?(avgRT/1000).toFixed(1)+'s':'—')+'</span></div><div class="pr"><span>أسرع</span><span style="color:var(--bl)">'+(rts.length?(Math.min.apply(null,rts)/1000).toFixed(1)+'s':'—')+'</span></div><div class="pr"><span>أبطأ</span><span style="color:var(--or)">'+(rts.length?(Math.max.apply(null,rts)/1000).toFixed(1)+'s':'—')+'</span></div><div class="pr"><span>نسبة النجاح</span><span style="color:var(--gn)">'+(msgs?Math.round(msgs/(msgs+errs)*100)+'%':'—')+'</span></div>';

    /* LANGS */
    var tL=arC+enC||1;
    document.getElementById('langs').innerHTML='<div class="pi"><label><span>🇸🇦 عربي</span><b>'+Math.round(arC/tL*100)+'% ('+arC+')</b></label><div class="pt"><div class="pf" style="width:'+Math.round(arC/tL*100)+'%;background:var(--ac)"></div></div></div><div class="pi"><label><span>🇺🇸 إنجليزي</span><b>'+Math.round(enC/tL*100)+'% ('+enC+')</b></label><div class="pt"><div class="pf" style="width:'+Math.round(enC/tL*100)+'%;background:var(--bl)"></div></div></div>';

    /* DEVICES */
    var da=Object.entries(devs).sort(function(a,b){return b[1]-a[1]});
    var dT=da.reduce(function(s,e){return s+e[1]},0)||1;
    var dh='';var cls=['var(--ac)','var(--gn)','var(--bl)','var(--or)','var(--pu)'];
    for(var di=0;di<da.length;di++){var dp=Math.round(da[di][1]/dT*100);dh+='<div class="pi"><label><span>'+da[di][0]+'</span><b>'+dp+'%</b></label><div class="pt"><div class="pf" style="width:'+dp+'%;background:'+cls[di%5]+'"></div></div></div>'}
    document.getElementById('devs').innerHTML=dh||'<div class="em">—</div>';

    /* USERS */
    var va=Object.entries(visitors).sort(function(a,b){return b[1].last-a[1].last});
    document.getElementById('uc').textContent=va.length+' مستخدم';
    if(!va.length){document.getElementById('utbl').innerHTML='<div class="em">لا مستخدمون</div>';return}
    var tb='<table><thead><tr><th>المعرف</th><th>الجهاز</th><th>الشاشة</th><th>الرسائل</th><th>الزيارات</th><th>آخر ظهور</th><th>الحالة</th></tr></thead><tbody>';
    for(var ui=0;ui<Math.min(va.length,50);ui++){var uid=va[ui][0],uv=va[ui][1];var on2=Date.now()-uv.last<300000;tb+='<tr><td style="font-family:var(--m);font-size:10px">'+uid.slice(0,12)+'</td><td>'+pUA(uv.ua)+'</td><td style="font-family:var(--m);font-size:10px">'+(uv.scr||'—')+'</td><td><b>'+uv.msgs+'</b></td><td>'+uv.visits+'</td><td style="font-size:10px">'+tAgo(uv.last)+'</td><td><span class="bg '+(on2?'bg-g':'bg-b')+'">'+(on2?'متصل':'غير متصل')+'</span></td></tr>'}
    tb+='</tbody></table>';
    document.getElementById('utbl').innerHTML=tb;
}

/* EXPORT */
window.doExport=function(){
    var b=new Blob([JSON.stringify({date:new Date().toISOString(),count:allLogs.length,logs:allLogs},null,2)],{type:'application/json'});
    var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='lord-admin-'+today+'.json';a.click();
};

/* AUTO */
setInterval(function(){if(db&&sessionStorage.getItem('la')==='1')loadData()},120000);
</script>
