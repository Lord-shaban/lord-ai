<!doctype html>
<!-- LORD AI — games design preview. Open this file in a browser to eyeball
     the new game visuals (light/dark) without the full app or Firebase.
     Safe to delete anytime; it only loads style.css + games.js. -->
<html lang="ar" dir="rtl" data-theme="dark">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>LORD AI — معاينة الألعاب</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: block; height: auto; overflow: auto; padding: 22px 16px 80px; }
        .pv-bar {
            position: sticky; top: 0; z-index: 50; display: flex; gap: 10px; flex-wrap: wrap;
            align-items: center; padding: 12px 16px; margin: -22px -16px 20px; background: var(--sidebar-bg);
            border-bottom: 1px solid var(--line);
        }
        .pv-bar h1 { font-size: 1rem; font-weight: 800; margin-inline-end: auto; }
        .pv-bar button {
            background: var(--accent); color: #fff; border: none; border-radius: 99px;
            padding: 8px 16px; font: 700 .8rem var(--sans); cursor: pointer;
        }
        .pv-bar .ghost { background: var(--surface); color: var(--c1); border: 1px solid var(--line); }
        .pv-wrap { max-width: 620px; margin: 0 auto; }
        .pv-open { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 18px; }
        .pv-open button {
            background: var(--surface); border: 1px solid var(--line); color: var(--c1);
            border-radius: 99px; padding: 7px 14px; font: 600 .78rem var(--sans); cursor: pointer;
        }
        #host > .game-frame { margin-inline: auto; }
    </style>
</head>

<body>
    <div class="pv-bar">
        <h1>معاينة الألعاب — LORD AI</h1>
        <button class="ghost" id="themeBtn">تبديل الثيم</button>
        <button id="hubBtn">افتح الهَب</button>
    </div>
    <div class="pv-wrap">
        <div class="pv-open" id="openRow"></div>
        <div id="host"></div>
    </div>

    <script src="games.js"></script>
    <script>
        var host = document.getElementById('host');
        var openRow = document.getElementById('openRow');

        function showHub() { host.innerHTML = LordGames.hubFrameHTML(); }

        // one quick-open chip per game (mounts it straight away)
        LordGames.list.forEach(function (g) {
            var b = document.createElement('button');
            b.textContent = g.name;
            b.onclick = function () {
                host.innerHTML = LordGames.posterFrameHTML(g);
                var frame = host.querySelector('.game-frame');
                LordGames.mount(frame, g.id, false);
            };
            openRow.appendChild(b);
        });

        document.getElementById('hubBtn').onclick = showHub;
        document.getElementById('themeBtn').onclick = function () {
            var h = document.documentElement;
            h.setAttribute('data-theme', h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        };
        showHub();
    </script>
</body>

</html>
